<!DOCTYPE html>
<html>
<head>
    <title>Azure Smart Translator</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>Smart Translator 🌍</h1>

    <div class="card">
        <textarea id="inputText" placeholder="Type or speak here..."></textarea>

        <!-- FIXED ID -->
        <select id="targetLang">
            <option value="fr">French</option>
            <option value="es">Spanish</option>
            <option value="de">German</option>
            <option value="zh-Hans">Chinese</option>
            <option value="ja">Japanese</option>
        </select>

        <!-- ADD type="button" -->
        <button type="button" onclick="translateText()">Translate</button>
        <button type="button" onclick="speakText()">🔊 Play</button>
        <button type="button" onclick="startListening()" id="micBtn">🎤 Speak</button>
        
        <p id="status"></p>
        <div class="spinner" id="loader"></div>
    </div>

    <div class="card">
        <h3>Translated Text</h3>
        <!-- FIXED ID -->
        <p id="output"></p>
    </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
